services:
  - type: web
    name: taskflow
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      npm install --prefix backend &&
      npm install --prefix frontend &&
      npm run build --prefix frontend
    startCommand: npm start --prefix backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
